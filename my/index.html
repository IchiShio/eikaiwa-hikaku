    .tool-bar-track {
      height: 4px; background: var(--surface-2); border-radius: 2px; margin-top: 6px; overflow: hidden;

    /* ── CALENDAR ── */

    /* ── CTA ── */

  </style>

  <main class="page" id="app"></main>

  <script>
  (function () {
    'use strict';

    var KEY = 'nativereal_xp';
    var LEVELS = [
      { name: 'Starter',    threshold: 0,    icon: '\uD83C\uDF31' },
      { name: 'Learner',    threshold: 30,   icon: '\uD83D\uDCD6' },
      { name: 'Explorer',   threshold: 100,  icon: '\uD83E\uDDED' },
      { name: 'Challenger', threshold: 250,  icon: '\u26A1' },
      { name: 'Achiever',   threshold: 500,  icon: '\uD83C\uDFC5' },
      { name: 'Expert',     threshold: 1000, icon: '\uD83C\uDFAF' },
      { name: 'Master',     threshold: 2000, icon: '\uD83D\uDC51' },
    ];

    var TOOLS = [
      { key: 'listenup', label: 'ListenUp',       path: '/',             icon: '\uD83C\uDFA7', color: '#3b82f6' },
      { key: 'grammar',  label: 'GrammarUp',       path: '/grammar/',     icon: '\uD83D\uDCDD', color: '#8b5cf6' },
      { key: 'kioku',    label: '\u8A18\u61B6\u3057\u306A\u3044\u82F1\u5358\u8A9E', path: '/kioku-shinai/', icon: '\uD83E\uDDE0', color: '#f59e0b' },
    ];

    function load() {
      try {
        var d = JSON.parse(localStorage.getItem(KEY));
        if (d && typeof d.total === 'number') return d;
      } catch (_) {}
      return null;
    }

    function getLevel(xp) {
      for (var i = LEVELS.length - 1; i >= 0; i--) {
        if (xp >= LEVELS[i].threshold) return { index: i, def: LEVELS[i] };
      }
      return { index: 0, def: LEVELS[0] };
    }

    function render() {
      var app = document.getElementById('app');
      var d = load();

      if (!d || d.total === 0) {
        app.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-icon">\uD83C\uDF31</div>' +
            '<div class="empty-title">\u307E\u3060\u5B66\u7FD2\u3092\u59CB\u3081\u3066\u3044\u307E\u305B\u3093</div>' +
            '<div class="empty-desc">\u30AF\u30A4\u30BA\u306B\u7B54\u3048\u308B\u3068XP\u304C\u8CAF\u307E\u308A\u3001<br>\u30EC\u30D9\u30EB\u304C\u4E0A\u304C\u3063\u3066\u3044\u304D\u307E\u3059\u3002</div>' +
            '<a href="/" class="cta-btn">\uD83C\uDFA7 ListenUp \u3092\u59CB\u3081\u308B</a>' +
          '</div>';
        return;
      }

      var lv = getLevel(d.total);
      var nextLv = LEVELS[lv.index + 1];
      var pct = nextLv
        ? Math.min(100, Math.round((d.total - lv.def.threshold) / (nextLv.threshold - lv.def.threshold) * 100))
        : 100;
      var nextLabel = nextLv ? 'Next: ' + nextLv.icon + ' ' + nextLv.name + ' (' + nextLv.threshold + ' XP)' : 'MAX LEVEL';

      var maxToolXP = 0;
      TOOLS.forEach(function (t) { if (d.tools[t.key] > maxToolXP) maxToolXP = d.tools[t.key]; });

      var html = '';

      // Level hero
      html += '<div class="level-hero">';
      html += '<div class="level-icon">' + lv.def.icon + '</div>';
      html += '<div class="level-label">LEVEL ' + (lv.index + 1) + '</div>';
      html += '<div class="level-name">' + lv.def.name + '</div>';
      html += '<div class="level-xp">' + d.total.toLocaleString() + '</div>';
      html += '<div class="level-xp-label">Total XP</div>';
      html += '<div class="level-progress">';
      html += '<div class="level-progress-info"><span>' + pct + '%</span><span>' + nextLabel + '</span></div>';
      html += '<div class="level-track"><div class="level-fill" style="width:' + pct + '%"></div></div>';
      html += '</div></div>';

      // Stats row
      html += '<div class="stats-row">';
      html += '<div class="stat-card"><div class="stat-value">' + (d.streak || 0) + '</div><div class="stat-label">\uD83D\uDD25 \u9023\u7D9A\u65E5\u6570</div></div>';
      var activeDays = d.history ? d.history.length : (d.lastDate ? 1 : 0);
      html += '<div class="stat-card"><div class="stat-value">' + activeDays + '</div><div class="stat-label">\uD83D\uDCC5 \u5B66\u7FD2\u65E5\u6570</div></div>';
      html += '</div>';

      // Tool breakdown
      html += '<div class="section-title">\uD83D\uDCCA \u30C4\u30FC\u30EB\u5225XP</div>';
      html += '<div class="tool-list">';
      TOOLS.forEach(function (t) {
        var txp = (d.tools && d.tools[t.key]) || 0;
        var barPct = maxToolXP > 0 ? Math.round(txp / maxToolXP * 100) : 0;
        html += '<a href="' + t.path + '" class="tool-item">';
        html += '<span class="tool-icon">' + t.icon + '</span>';
        html += '<div class="tool-info">';
        html += '<div class="tool-name">' + t.label + '</div>';
        html += '<div class="tool-xp">' + txp.toLocaleString() + ' XP</div>';
        html += '<div class="tool-bar-track"><div class="tool-bar-fill" style="width:' + barPct + '%;background:' + t.color + '"></div></div>';
        html += '</div>';
        if (txp === 0) html += '<span class="tool-badge">NEW</span>';
        html += '<span class="tool-arrow">\u203A</span>';
        html += '</a>';
      });
      html += '</div>';

      // 30-day calendar
      html += '<div class="calendar">';
      html += '<div class="section-title">\uD83D\uDCC5 \u904E\u53BB30\u65E5\u306E\u5B66\u7FD2</div>';
      html += '<div class="cal-grid">';
      var dayLabels = ['\u6708', '\u706B', '\u6C34', '\u6728', '\u91D1', '\u571F', '\u65E5'];
      dayLabels.forEach(function (dl) {
        html += '<div class="cal-header">' + dl + '</div>';
      });

      var today = new Date();
      var todayStr = today.toISOString().slice(0, 10);
      var historySet = {};
      if (d.history) d.history.forEach(function (h) { historySet[h] = true; });

      // Build 35 days (5 weeks) ending today
      var startDate = new Date(today);
      startDate.setDate(startDate.getDate() - 34);
      // Adjust to start on Monday
      var startDay = startDate.getDay(); // 0=Sun
      var mondayOffset = startDay === 0 ? -6 : 1 - startDay;
      startDate.setDate(startDate.getDate() + mondayOffset);

      var cursor = new Date(startDate);
      for (var i = 0; i < 35; i++) {
        var dateStr = cursor.toISOString().slice(0, 10);
        var cls = 'cal-day';
        if (dateStr > todayStr) {
          cls += ' empty';
        } else {
          if (historySet[dateStr]) cls += ' active';
          if (dateStr === todayStr) cls += ' today';
        }
        html += '<div class="' + cls + '" title="' + dateStr + '"></div>';
        cursor.setDate(cursor.getDate() + 1);
      }
      html += '</div></div>';

      // CTA
      var suggestion = null;
      TOOLS.forEach(function (t) {
        if (!suggestion && (!d.tools[t.key] || d.tools[t.key] === 0)) suggestion = t;
      });
      if (suggestion) {
        html += '<div class="cta-section">';
        html += '<a href="' + suggestion.path + '" class="cta-btn">' + suggestion.icon + ' ' + suggestion.label + ' \u3082\u8A66\u3057\u3066\u307F\u3088\u3046</a>';
        html += '</div>';
      }

      app.innerHTML = html;
    }

    // Header scroll
    var hdr = document.getElementById('siteHeader');
    if (hdr) {
      window.addEventListener('scroll', function () {
        hdr.classList.toggle('scrolled', window.scrollY > 10);
      }, { passive: true });
    }

    // Mobile nav
    var hamburger = document.getElementById('siteHamburger');
    var mobileNav = document.getElementById('siteMobileNav');
    if (hamburger && mobileNav) {
      hamburger.addEventListener('click', function () {
        mobileNav.classList.toggle('open');
      });
    }

    render();
  })();
  </script>

<script>
(function(){
  var b=document.getElementById('siteHamburger'),n=document.getElementById('siteMobileNav');
  if(b&&n){
    b.addEventListener('click',function(){b.classList.toggle('active');n.classList.toggle('active');document.body.style.overflow=n.classList.contains('active')?'hidden':'';});
    n.addEventListener('click',function(e){if(e.target===n||e.target.tagName==='A'){n.classList.remove('active');b.classList.remove('active');document.body.style.overflow='';}});
  }
  var h=document.getElementById('siteHeader');
  if(h){var t=false;window.addEventListener('scroll',function(){if(!t){requestAnimationFrame(function(){h.classList.toggle('scrolled',window.scrollY>40);t=false;});t=true;}});}
  document.querySelectorAll('.nav-dd-trigger').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var dd=btn.parentElement;
      document.querySelectorAll('.nav-dd.open').forEach(function(d){if(d!==dd)d.classList.remove('open');});
      dd.classList.toggle('open');
    });
  });
  document.addEventListener('click',function(){document.querySelectorAll('.nav-dd.open').forEach(function(d){d.classList.remove('open');});});
})();
</script>
</body>
</html>

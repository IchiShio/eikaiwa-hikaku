<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;--white:#fff;--surface:rgba(0,0,0,.04);--surface2:rgba(0,0,0,.07);
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.15);
  --accent:#c0392b;--accent2:#e74c3c;--accent-soft:rgba(192,57,43,.08);
  --gold:#d4a017;--gold-soft:rgba(212,160,23,.12);
  --correct:#16a34a;--correct-soft:rgba(22,163,74,.1);
  --wrong:#dc2626;--wrong-soft:rgba(220,38,38,.1);
  --text1:rgba(0,0,0,.88);--text2:rgba(0,0,0,.55);--text3:rgba(0,0,0,.35);
  --prefix:#2563eb;--prefix-soft:rgba(37,99,235,.1);
  --root:#c0392b;--root-soft:rgba(192,57,43,.1);
  --suffix:#059669;--suffix-soft:rgba(5,150,105,.1);
  --radius:16px;--radius-sm:10px;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.container{max-width:540px;margin:0 auto;padding:0 20px}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-size:14px;font-weight:700;color:var(--text1);text-decoration:none}
.header-logo span{color:var(--accent)}
.header-back{font-size:14px;color:var(--text2);cursor:pointer;padding:8px 12px;border-radius:8px;border:none;background:none}
.header-back:hover{background:var(--surface)}

/* ── LP ── */
.lp-hero{padding:80px 0 40px;text-align:center}
.lp-hero h1{font-size:36px;font-weight:900;line-height:1.2;letter-spacing:-.5px;margin-bottom:12px}
.lp-hero .accent{color:var(--accent)}
.lp-hero .sub{font-size:18px;color:var(--text2);font-weight:500;margin-bottom:40px;line-height:1.6}

/* Root demo on LP */
.lp-demo{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:32px;text-align:left}
.lp-demo h3{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.lp-demo .root-label{display:inline-block;background:var(--root-soft);color:var(--root);font-size:28px;font-weight:900;padding:8px 20px;border-radius:var(--radius-sm);margin-bottom:4px}
.lp-demo .root-meaning{font-size:15px;color:var(--text2);margin-bottom:20px}
.lp-tree{display:flex;flex-direction:column;gap:8px}
.lp-tree-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);background:var(--surface);transition:background .15s}
.lp-tree-prefix{font-weight:800;color:var(--prefix);min-width:50px;text-align:right;font-size:15px}
.lp-tree-plus{color:var(--text3);font-size:13px}
.lp-tree-root{font-weight:800;color:var(--root);font-size:15px}
.lp-tree-arrow{color:var(--text3);font-size:13px}
.lp-tree-word{font-weight:700;font-size:15px}
.lp-tree-ja{color:var(--text2);font-size:13px;margin-left:auto}

.btn-cta{display:block;width:100%;background:var(--accent);color:#fff;border:none;padding:18px;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;text-align:center}
.btn-cta:hover{background:var(--accent2)}
.btn-cta:active{transform:scale(.98)}

.lp-note{text-align:center;font-size:13px;color:var(--text3);margin-top:12px}

/* ── ROOT SELECT ── */
.root-select{padding:24px 0 40px}
.root-select h2{font-size:22px;font-weight:900;margin-bottom:6px}
.root-select .desc{font-size:14px;color:var(--text2);margin-bottom:20px}
.root-grid{display:grid;grid-template-columns:1fr;gap:10px}
.root-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;align-items:center;gap:16px}
.root-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.root-card.completed{border-color:var(--correct);background:var(--correct-soft)}
.root-card .rc-icon{width:48px;height:48px;border-radius:12px;background:var(--root-soft);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--root);flex-shrink:0}
.root-card.completed .rc-icon{background:var(--correct-soft);color:var(--correct)}
.rc-info{flex:1}
.rc-info .rc-name{font-size:17px;font-weight:800}
.rc-info .rc-meaning{font-size:13px;color:var(--text2)}
.rc-info .rc-count{font-size:12px;color:var(--text3);margin-top:2px}
.rc-check{color:var(--correct);font-size:20px;font-weight:900;display:none}
.root-card.completed .rc-check{display:block}

/* ── QUIZ ── */
.quiz-header{padding:12px 0 4px;display:flex;align-items:center;justify-content:space-between}
.quiz-progress-text{font-size:14px;font-weight:700}
.quiz-progress-text span{color:var(--text3);font-weight:400}
.quiz-type{font-size:12px;color:var(--text2);background:var(--surface);padding:4px 10px;border-radius:20px}
.quiz-bar{height:4px;background:var(--surface2);border-radius:4px;margin-bottom:20px}
.quiz-bar-fill{height:4px;background:var(--accent);border-radius:4px;transition:width .4s ease}

/* Root intro */
.root-intro{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;text-align:center}
.root-intro .ri-root{font-size:36px;font-weight:900;color:var(--root);margin-bottom:4px}
.root-intro .ri-meaning{font-size:16px;color:var(--text2);margin-bottom:12px}
.root-intro .ri-hook{background:var(--gold-soft);border-radius:var(--radius-sm);padding:14px 16px;text-align:left}
.root-intro .ri-hook-label{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:4px}
.root-intro .ri-hook-text{font-size:14px;line-height:1.6;color:var(--text1)}

/* Question area */
.q-word{text-align:center;padding:24px 0 8px}
.q-word-text{font-family:'Inter',sans-serif;font-size:42px;font-weight:900;letter-spacing:-1px;display:inline}
.q-play{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--accent-soft);border:none;cursor:pointer;margin-left:8px;vertical-align:middle;transition:background .15s}
.q-play:hover{background:rgba(192,57,43,.15)}
.q-play svg{width:16px;height:16px;fill:var(--accent)}
.q-phonetic{font-size:14px;color:var(--text3);text-align:center;margin-bottom:4px}
.q-instruction{font-size:17px;font-weight:700;text-align:center;padding:12px 0 16px}

/* Choices */
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{text-align:left;padding:14px 16px;border-radius:var(--radius-sm);font-size:16px;font-weight:600;border:2px solid var(--border);background:var(--white);cursor:pointer;transition:border-color .15s,background .15s;min-height:48px;display:flex;align-items:center}
.choice-btn:hover:not(:disabled){border-color:rgba(192,57,43,.3)}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{background:var(--correct-soft);border-color:var(--correct);color:var(--correct)}
.choice-btn.wrong{background:var(--wrong-soft);border-color:var(--wrong);color:var(--wrong)}
.choice-btn.dim{opacity:.3}

/* Fill-in sentence */
.q-sentence{font-size:18px;line-height:1.7;text-align:center;padding:20px 0;font-weight:500}
.q-blank{display:inline-block;min-width:90px;border-bottom:3px solid var(--accent);padding-bottom:2px;margin:0 4px;font-weight:800}
.q-blank.correct{border-color:var(--correct);color:var(--correct)}
.q-blank.wrong{border-color:var(--wrong);color:var(--wrong)}
.q-hint{font-size:16px;text-align:center;color:var(--text1);padding-bottom:12px}

/* Etymology blocks */
.etym-blocks{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin:12px 0}
.etym-part{border-radius:var(--radius-sm);padding:8px 16px;text-align:center}
.etym-part.prefix{background:var(--prefix-soft);color:var(--prefix)}
.etym-part.root{background:var(--root-soft);color:var(--root)}
.etym-part.suffix{background:var(--suffix-soft);color:var(--suffix)}
.etym-part-name{font-size:18px;font-weight:900}
.etym-part-meaning{font-size:11px;font-weight:600;margin-top:2px}
.etym-plus{color:var(--text3);font-size:16px;font-weight:300}

/* Explanation */
.explanation{margin-top:16px;animation:fadeUp .3s ease}
.exp-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:8px}
.exp-result{font-size:18px;font-weight:900;margin-bottom:12px}
.exp-result.ok{color:var(--correct)}
.exp-result.ng{color:var(--wrong)}
.exp-result small{font-size:13px;font-weight:500;color:var(--text2);margin-left:8px}
.exp-hook{background:var(--gold-soft);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px}
.exp-hook-label{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:4px}
.exp-hook-text{font-size:14px;line-height:1.6}
.exp-section{margin-bottom:12px}
.exp-section-label{font-size:12px;font-weight:800;color:var(--accent);margin-bottom:4px}
.exp-section-label.gold{color:var(--gold)}
.exp-section-text{font-size:14px;line-height:1.7;color:var(--text1)}
.exp-oneliner{font-size:16px;font-weight:700;text-align:center;line-height:1.5;padding:8px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px}

/* Next button */
.btn-next-wrap{position:sticky;bottom:0;padding:10px 0 14px;background:linear-gradient(transparent,var(--bg) 30%)}
.btn-next{display:block;width:100%;background:var(--accent);color:#fff;border:none;padding:16px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-next:hover{background:var(--accent2)}

/* ── COMPLETE ── */
.complete{text-align:center;padding:80px 0 40px}
.complete-score{font-size:56px;font-weight:900;color:var(--accent)}
.complete h2{font-size:24px;font-weight:900;margin:8px 0}
.complete .detail{font-size:16px;color:var(--text2);margin-bottom:8px}
.complete .msg{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:32px}
.btn-secondary{display:block;width:100%;background:var(--white);color:var(--text1);border:2px solid var(--border);padding:16px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;transition:border-color .15s}
.btn-secondary:hover{border-color:var(--accent)}

/* ── ANIMATION ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease}

/* ── FOOTER ── */
.footer{text-align:center;padding:40px 20px;font-size:12px;color:var(--text3);border-top:1px solid var(--border);margin-top:40px}
.footer a{color:var(--text2);text-decoration:none}
</style>
</head>

<script>
/* ══════════════════════════════
   STATE
   ══════════════════════════════ */
let ROOT_DATA = null;   // loaded JSON
let queue = [];          // [{wordIdx, fmtIdx}]
let qi = 0;
let answered = null;
let correctCount = 0;
let totalCount = 0;
let audioEl = null;
const STORAGE_KEY = 'kioku_v1';

/* ── LP tree demo ── */
const LP_TREE = [
  {pre:'pro',root:'duce',word:'produce',ja:'生み出す'},
  {pre:'re',root:'duce',word:'reduce',ja:'減らす'},
  {pre:'con',root:'duct',word:'conduct',ja:'指揮する'},
  {pre:'intro',root:'duce',word:'introduce',ja:'紹介する'},
  {pre:'de',root:'duct',word:'deduct',ja:'差し引く'},
  {pre:'e(ex)',root:'duc',word:'educate',ja:'教育する'},
  {pre:'in',root:'duce',word:'induce',ja:'誘導する'},
  {pre:'de',root:'duce',word:'deduce',ja:'推論する'},
];

function renderLpTree(){
  const el = document.getElementById('lpTree');
  el.innerHTML = LP_TREE.map(t => `
    <div class="lp-tree-item">
      <span class="lp-tree-prefix">${t.pre}</span>
      <span class="lp-tree-plus">+</span>
      <span class="lp-tree-root">${t.root}</span>
      <span class="lp-tree-arrow">→</span>
      <span class="lp-tree-word">${t.word}</span>
      <span class="lp-tree-ja">${t.ja}</span>
    </div>`).join('');
}

/* ── ROOT DEFINITIONS ── */
const ROOTS = [
  {id:'duct',label:'duct/duc',meaning:'導く',count:8,file:'duct.json',available:true},
  {id:'spec',label:'spec/spect',meaning:'見る',count:10,file:'spec.json',available:true},
  {id:'port',label:'port',meaning:'運ぶ',count:8,file:'port.json',available:true},
  {id:'ven',label:'ven/vent',meaning:'来る',count:8,file:'ven.json',available:true},
  {id:'mit',label:'mit/miss',meaning:'送る',count:8,file:'mit.json',available:true},
  {id:'ten',label:'ten/tain',meaning:'保つ',count:8,file:'ten.json',available:true},
  {id:'fact',label:'fact/fect/fic',meaning:'作る',count:10,file:'fact.json',available:true},
  {id:'sta',label:'sta/stat/sist',meaning:'立つ',count:10,file:'sta.json',available:true},
  {id:'ced',label:'ced/cess',meaning:'行く',count:8,file:'ced.json',available:true},
  {id:'cap',label:'cap/cep/ceiv',meaning:'取る',count:8,file:'cap.json',available:true},
  {id:'pos',label:'pos/pon/pose',meaning:'置く',count:8,file:'pos.json',available:true},
  {id:'fer',label:'fer',meaning:'運ぶ',count:8,file:'fer.json',available:true},
  {id:'scrib',label:'scrib/script',meaning:'書く',count:8,file:'scrib.json',available:true},
  {id:'tract',label:'tract',meaning:'引く',count:8,file:'tract.json',available:true},
  {id:'rupt',label:'rupt',meaning:'壊す',count:6,file:'rupt.json',available:true},
  {id:'struct',label:'struct',meaning:'建てる',count:6,file:'struct.json',available:true},
  {id:'vis',label:'vis/vid',meaning:'見る(2)',count:8,file:'vis.json',available:true},
  {id:'sign',label:'sign',meaning:'しるし',count:7,file:'sign.json',available:true},
  {id:'gen',label:'gen',meaning:'生む・種',count:7,file:'gen.json',available:true},
  {id:'form',label:'form',meaning:'形',count:6,file:'form.json',available:true},
  {id:'loc',label:'loc',meaning:'場所',count:6,file:'loc.json',available:true},
  {id:'dic',label:'dic/dict',meaning:'言う',count:6,file:null,available:false},
  {id:'clos',label:'clud/clus',meaning:'閉じる',count:6,file:null,available:false},
  {id:'cur',label:'cur/cour',meaning:'走る',count:8,file:null,available:false},
  {id:'reg',label:'reg/rect',meaning:'まっすぐ',count:6,file:null,available:false},
  {id:'part',label:'part',meaning:'分ける',count:6,file:null,available:false},
  {id:'ject',label:'ject',meaning:'投げる',count:6,file:null,available:false},
  {id:'pend',label:'pend/pens',meaning:'ぶら下がる',count:6,file:null,available:false},
  {id:'sent',label:'sent/sens',meaning:'感じる',count:6,file:null,available:false},
  {id:'valu',label:'valu/val',meaning:'価値',count:6,file:null,available:false},
];

/* ── SCREEN NAV ── */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('backBtn').style.display = id==='screenLp'?'none':'block';
  window.scrollTo(0,0);
}

function goBack(){
  const active = document.querySelector('.screen.active');
  if(active.id==='screenQuiz'||active.id==='screenComplete') showScreen('screenSelect');
  else showScreen('screenLp');
}

function showRootSelect(){
  renderRootGrid();
  showScreen('screenSelect');
}

/* ── ROOT GRID ── */
function loadProgress(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{completedRoots:[],rootProgress:{}};}
  catch(e){return {completedRoots:[],rootProgress:{}};}
}
function saveProgress(prog){localStorage.setItem(STORAGE_KEY,JSON.stringify(prog));}

function renderRootGrid(){
  const prog = loadProgress();
  const grid = document.getElementById('rootGrid');
  grid.innerHTML = ROOTS.map(r=>{
    const done = prog.completedRoots.includes(r.id);
    const avail = r.available;
    return `<div class="root-card ${done?'completed':''} ${avail?'':'disabled'}"
                 onclick="${avail?`startRoot('${r.id}')`:''}">
      <div class="rc-icon">${r.label.split('/')[0]}</div>
      <div class="rc-info">
        <div class="rc-name">${r.label} <span style="color:var(--text2);font-weight:400;font-size:14px">= ${r.meaning}</span></div>
        <div class="rc-count">${r.count}語${avail?'':' — 近日公開'}</div>
      </div>
      <div class="rc-check">✓</div>
    </div>`;
  }).join('');
}

/* ── START ROOT ── */
async function startRoot(rootId){
  const r = ROOTS.find(x=>x.id===rootId);
  if(!r||!r.file) return;
  try{
    const res = await fetch(`data/words/${r.file}`);
    ROOT_DATA = await res.json();
  }catch(e){alert('データの読み込みに失敗しました');return;}

  // Build queue: each word starts with easiest format
  queue = ROOT_DATA.words.map((w,wi)=>{
    const sorted = w.formats.map((f,fi)=>({fi,d:f.difficulty})).sort((a,b)=>a.d-b.d);
    return {wordIdx:wi, fmtIdx:sorted[0].fi};
  });
  qi=0; answered=null; correctCount=0; totalCount=0;

  try{gtag('event','kioku_root_start',{root_name:rootId});}catch(_){}
  showScreen('screenQuiz');
  showRootIntro();
}

/* ── ROOT INTRO ── */
function showRootIntro(){
  const el = document.getElementById('rootIntro');
  el.style.display='block';
  el.innerHTML=`<div class="root-intro fade-up">
    <div class="ri-root">${ROOT_DATA.root}</div>
    <div class="ri-meaning">${ROOT_DATA.rootMeaning}（${ROOT_DATA.rootLang}）</div>
    <div class="ri-hook">
      <div class="ri-hook-label">${ROOT_DATA.hook.label}</div>
      <div class="ri-hook-text">${ROOT_DATA.hook.text}</div>
    </div>
  </div>
  <div style="padding:12px 0 8px;text-align:center;font-size:14px;color:var(--text2)">
    ${ROOT_DATA.words.length}語の派生語を学びます
  </div>
  <button class="btn-cta" onclick="hideIntroStartQuiz()">クイズを始める</button>`;
  updateQuizHeader();
}

function hideIntroStartQuiz(){
  document.getElementById('rootIntro').style.display='none';
  renderQuestion();
}

/* ── QUIZ RENDERING ── */
function updateQuizHeader(){
  document.getElementById('qProgress').innerHTML=`${qi+1} <span>/ ${queue.length}</span>`;
  document.getElementById('qBar').style.width=`${((qi+1)/queue.length)*100}%`;
  const cur=queue[qi];
  if(cur&&ROOT_DATA) document.getElementById('qType').textContent=ROOT_DATA.words[cur.wordIdx].formats[cur.fmtIdx].type;
}

function renderQuestion(){
  answered=null;
  updateQuizHeader();
  const cur=queue[qi];
  const w=ROOT_DATA.words[cur.wordIdx];
  const f=w.formats[cur.fmtIdx];
  const area=document.getElementById('questionArea');
  document.getElementById('explanationArea').innerHTML='';

  let html='<div class="fade-up">';

  if(f.type==='穴埋め'){
    const [a,b]=(f.sentence||'').split('______');
    html+=`<div class="q-hint">${f.hint||''}</div>
      <div class="q-sentence">${a}<span class="q-blank" id="qBlank">&nbsp;</span>${b}</div>`;
  } else {
    html+=`<div class="q-word">
      <span class="q-word-text">${f.type==='穴埋め'?'':w.word}</span>
      <button class="q-play" onclick="playAudio('${w.word}')">
        <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
      </button>
    </div>
    <div class="q-phonetic">${w.phonetic}</div>
    <div class="q-instruction">${f.instruction}</div>`;
  }

  html+='<div class="choices">';
  f.choices.forEach((c,i)=>{
    html+=`<button class="choice-btn" onclick="choose(${i})">${c}</button>`;
  });
  html+='</div></div>';
  area.innerHTML=html;
}

/* ── ANSWER ── */
function choose(i){
  if(answered!==null) return;
  answered=i;
  totalCount++;

  const cur=queue[qi];
  const w=ROOT_DATA.words[cur.wordIdx];
  const f=w.formats[cur.fmtIdx];
  const isOk=i===f.correct;
  if(isOk) correctCount++;

  try{gtag('event','kioku_quiz_answer',{root_name:ROOT_DATA.root,word:w.word,correct:isOk});}catch(_){}

  // Update choice buttons
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach((btn,j)=>{
    btn.disabled=true;
    if(j===f.correct) btn.classList.add('correct');
    else if(j===i) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  // Fill-in blank
  const blank=document.getElementById('qBlank');
  if(blank){
    blank.textContent=f.choices[i];
    blank.classList.add(isOk?'correct':'wrong');
  }

  // Adaptive: add next format to queue
  const nextFmt = getNextFormat(w, cur.fmtIdx, isOk);
  if(nextFmt!==null){
    const insertAt = Math.min(isOk?qi+2:qi+1, queue.length);
    queue.splice(insertAt,0,{wordIdx:cur.wordIdx,fmtIdx:nextFmt});
  }

  // Show explanation
  setTimeout(()=>showExplanation(w,f,isOk),100);
}

function getNextFormat(w,curIdx,ok){
  const curD=w.formats[curIdx].difficulty;
  if(ok){
    const harder=w.formats.map((f,i)=>({i,d:f.difficulty})).filter(f=>f.d>curD).sort((a,b)=>a.d-b.d);
    return harder.length>0?harder[Math.min(1,harder.length-1)].i:null;
  }
  const easier=w.formats.map((f,i)=>({i,d:f.difficulty})).filter(f=>f.i!==curIdx&&f.d<=curD).sort((a,b)=>b.d-a.d);
  return easier.length>0?easier[0].i:null;
}

/* ── EXPLANATION ── */
function showExplanation(w,f,isOk){
  const el=document.getElementById('explanationArea');
  const partsHtml=w.parts.map((p,i)=>`${i>0?'<span class="etym-plus">+</span>':''}
    <div class="etym-part ${p.type}">
      <div class="etym-part-name">${p.part}</div>
      <div class="etym-part-meaning">${p.meaning}</div>
    </div>`).join('');

  el.innerHTML=`<div class="explanation">
    <div class="exp-card">
      <div class="exp-result ${isOk?'ok':'ng'}">
        ${isOk?'正解！':'不正解'}
        <small>${isOk?'→ 次はより難しい形式で':'→ 別の角度からもう一度'}</small>
      </div>

      <div class="etym-blocks">${partsHtml}</div>

      <div class="exp-hook">
        <div class="exp-hook-label">${w.hook.label}</div>
        <div class="exp-hook-text">${w.hook.text}</div>
      </div>

      <div class="exp-oneliner">${w.etymology.oneliner}</div>

      <div class="exp-section">
        <div class="exp-section-label">語源</div>
        <div class="exp-section-text">${w.etymology.fact}</div>
      </div>
      <div class="exp-section">
        <div class="exp-section-label">認知言語学</div>
        <div class="exp-section-text">${w.cognitive.fact}</div>
      </div>
      <div class="exp-section">
        <div class="exp-section-label gold">和訳のズレ</div>
        <div class="exp-section-text">${w.gap}</div>
      </div>

      <div class="btn-next-wrap">
        <button class="btn-next" onclick="nextQuestion()">次へ</button>
      </div>
    </div>
  </div>`;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ── NEXT ── */
function nextQuestion(){
  qi++;
  if(qi>=queue.length){
    showComplete();
    return;
  }
  updateQuizHeader();
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── COMPLETE ── */
function showComplete(){
  const pct=totalCount>0?Math.round((correctCount/totalCount)*100):0;
  document.getElementById('compScore').textContent=pct+'%';
  document.getElementById('compTitle').textContent=`語根「${ROOT_DATA.root}」完了！`;
  document.getElementById('compDetail').textContent=`${correctCount}/${totalCount}問正解 ・ ${ROOT_DATA.words.length}語を学習`;
  document.getElementById('compMsg').textContent=`語根「${ROOT_DATA.rootMeaning}」から${ROOT_DATA.words.length}語の派生語を学びました。この語根を見かけたら「${ROOT_DATA.rootMeaning}」と読み替えてみてください。`;

  // Save progress
  const prog=loadProgress();
  if(!prog.completedRoots.includes(ROOT_DATA.root.split('/')[0])){
    prog.completedRoots.push(ROOT_DATA.root.split('/')[0]);
  }
  prog.rootProgress[ROOT_DATA.root]={correct:correctCount,total:totalCount,completedAt:new Date().toISOString().slice(0,10)};
  saveProgress(prog);

  try{gtag('event','kioku_root_complete',{root_name:ROOT_DATA.root,score:pct});}catch(_){}
  showScreen('screenComplete');
}

/* ── AUDIO ── */
function playAudio(word){
  if(audioEl){audioEl.pause();}
  audioEl=new Audio(`audio/${word}/word.mp3`);
  audioEl.play().catch(()=>{});
}

/* ── INIT ── */
renderLpTree();
</script>

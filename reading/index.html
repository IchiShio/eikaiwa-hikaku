    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .start-btn:hover { background: #1d4ed8; }

    /* ── App Header ── */
    .app-header { position: sticky; top: 0; z-index: 100; background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; }

    .result-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 28px; }

    .r-stat span { font-size: 2.6rem; font-weight: 900; color: var(--primary); }
    .r-stat small { font-size: 0.72rem; color: var(--muted); font-weight: 600; }
    .back-link { display: block; margin-top: 16px; font-size: 0.82rem; color: var(--muted); text-decoration: none; }

    /* Level Up Toast */
    .level-toast { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 9999; }
    .level-toast-inner { background: var(--primary); color: #fff; padding: 14px 32px; border-radius: 14px; font-weight: 800; font-size: 1.05rem; animation: toastAnim 1.3s forwards; box-shadow: 0 8px 32px rgba(37,99,235,0.4); }
    @keyframes toastAnim { 0%{opacity:0;transform:scale(0.75)translateY(10px)} 15%{opacity:1;transform:scale(1.04)translateY(0)} 80%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(0.95)} }

    @media(min-width:640px) {
      .hero h1 { font-size: 4rem; }
      .quiz-main { padding: 24px; }
      .passage { font-size: 1.25rem; }
    }
  </style>

<script src="questions.js"></script>
<script>
// ── ReadUp v1.0 ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'readup_v1';
const SRS_KEY     = 'readup_srs';
const SEEN_KEY    = 'readup_seen';
const LEVELS      = ['lv1','lv2','lv3','lv4','lv5'];
const LEVEL_DEFS  = [
  { name:'Beginner',     xp:0  },
  { name:'Word Spotter', xp:5  },
  { name:'Reader',       xp:12 },
  { name:'Context Pro',  xp:25 },
  { name:'Text Master',  xp:45 },
  { name:'Reading Pro',  xp:70 },
];

// ── State ─────────────────────────────────────────────────────────────────────
let pools=[], current=null, answered=false;
let score=0, total=0;
let curLevel=1, streak=0;
let sxp=0, slevel=0;
let srsItems={}, wrongOnce=new Set(), seenSet=new Set();
let progress=loadProgress();

function defaultProgress(){ return { totalAnswered:0, totalCorrect:0, axisStats:{} }; }
function loadProgress(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultProgress(); }catch(e){ return defaultProgress(); } }
function saveProgress(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(progress)); }catch(e){} }
function loadSRS(){ try{ srsItems=JSON.parse(localStorage.getItem(SRS_KEY))||{}; }catch(e){ srsItems={}; } }
function saveSRS(){ try{ localStorage.setItem(SRS_KEY,JSON.stringify(srsItems)); }catch(e){} }
function loadSeen(){ try{ seenSet=new Set(JSON.parse(localStorage.getItem(SEEN_KEY))||[]); }catch(e){} }
function saveSeen(){ try{ localStorage.setItem(SEEN_KEY,JSON.stringify([...seenSet])); }catch(e){} }

// ── DOM helpers ───────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const screens={start:$('startScreen'),quiz:$('quizScreen'),complete:$('completeScreen')};
function showScreen(n){ Object.values(screens).forEach(s=>s.classList.remove('active')); screens[n].classList.add('active'); }

// ── Init start screen ─────────────────────────────────────────────────────────
(function initStart(){
  $('statAnswered').textContent = progress.totalAnswered;
  $('statQCount').textContent   = DATA.length;
  if(progress.totalAnswered>0){
    $('statAcc').textContent = Math.round(progress.totalCorrect/progress.totalAnswered*100)+'%';
  }
  $('startBtn').onclick = beginQuiz;
  $('retryBtn').onclick = beginQuiz;
})();

// ── Begin quiz ────────────────────────────────────────────────────────────────
function beginQuiz(){
  score=0; total=0; sxp=0; slevel=0; curLevel=1; streak=0;
  loadSRS(); loadSeen();

  pools=[[],[],[],[],[]];
  DATA.forEach(q=>{ const i=LEVELS.indexOf(q.diff); if(i>=0) pools[i].push({...q}); });
  pools.forEach(p=>shuffle(p));

  $('endBtn').onclick=endSession;
  $('nextBtn').onclick=next;
  $('jaToggle').onclick=toggleJa;
  showScreen('quiz');
  loadQ();
}

// ── Question selection ────────────────────────────────────────────────────────
function pickQuestion(){
  // SRS due first
  const today=new Date().toISOString().slice(0,10);
  const due=Object.entries(srsItems)
    .filter(([,v])=>v.dueDate<=today)
    .map(([id])=>DATA.find(q=>q.id===id))
    .filter(Boolean);
  if(due.length) return due[0];

  // Current level pool (prefer unseen)
  const pool=pools[curLevel]||[];
  if(!pool.length){
    for(let i=curLevel-1;i>=0;i--) if(pools[i].length) return pools[i][0];
    for(let i=curLevel+1;i<5;i++)  if(pools[i].length) return pools[i][0];
    return null;
  }
  const unseen=pool.filter(q=>!seenSet.has(q.id));
  return (unseen.length?unseen:pool)[0];
}

function loadQ(){
  const q=pickQuestion();
  if(!q){ endSession(); return; }
  current=q; answered=false;
  renderQ(q);
  updateScore();
  updateLevelBar();
}

// ── Render question ───────────────────────────────────────────────────────────
function renderQ(q){
  // Type badge
  const tb=$('typeBadge');
  const typeMap={meaning:'語彙',phrase:'句動詞',context:'文脈',nuance:'語感',idiom:'イディオム',grammar:'文法'};
  tb.textContent = typeMap[q.axis]||q.axis;
  tb.className   = 'type-badge';
  if(q.type==='grammar') tb.classList.add('grammar');
  else if(q.axis==='idiom') tb.classList.add('idiom');
  $('diffBadge').textContent = q.diff;

  // Passage — highlight word or show blank
  let html = escHtml(q.text);
  if(q.type==='grammar'){
    html = html.replace('___','<span class="blank-slot">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  } else if(q.word){
    const esc=q.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    html = html.replace(new RegExp('('+esc+')','i'),'<mark>$1</mark>');
  }
  $('passageEl').innerHTML = html;

  // Japanese translation
  $('jaEl').textContent = q.ja;
  $('jaEl').classList.add('hidden');
  $('jaToggle').textContent = '日本語訳を見る ▾';

  // Question text
  $('questionEl').textContent = q.type==='grammar'
    ? '空欄に入る語（句）を選んでください'
    : q.word
      ? `"${q.word}" の意味として正しいものは？`
      : 'この文の意味として正しいものは？';

  // Choices
  const choicesEl=$('choicesEl');
  choicesEl.innerHTML='';
  const nums=['①','②','③','④','⑤'];
  const shuffled=[...q.choices];
  shuffle(shuffled);
  shuffled.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-num">${nums[i]}</span><span class="opt-text">${escHtml(c)}</span>`;
    btn.onclick=()=>choose(c);
    choicesEl.appendChild(btn);
  });

  // Reset state
  $('explEl').classList.add('hidden');
  $('nextBtn').classList.add('hidden');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Answer ────────────────────────────────────────────────────────────────────
function choose(selected){
  if(answered) return;
  answered=true;
  const ok = selected===current.answer;
  score+=ok?1:0;
  total++;

  // Mark buttons
  [...$('choicesEl').querySelectorAll('.opt-btn')].forEach(btn=>{
    btn.disabled=true;
    const t=btn.querySelector('.opt-text').textContent;
    if(t===current.answer) btn.classList.add('correct');
    else if(t===selected&&!ok) btn.classList.add('wrong');
  });

  // Adaptive difficulty
  if(ok){ streak++; if(streak>=2){ curLevel=Math.min(4,curLevel+1); streak=0; } }
  else  { streak=0; curLevel=Math.max(0,curLevel-1);
    if(wrongOnce.has(current.id)){
      // 2nd wrong → SRS
      if(!srsItems[current.id]) srsItems[current.id]={interval:1,reps:0};
      const item=srsItems[current.id];
      item.reps++;
      item.interval=item.reps===1?1:item.reps===2?3:Math.min(60,Math.round(item.interval*2.5));
      const due=new Date(); due.setDate(due.getDate()+item.interval);
      item.dueDate=due.toISOString().slice(0,10);
      saveSRS(); wrongOnce.delete(current.id);
    } else { wrongOnce.add(current.id); }
  }

  // Session XP + level
  const xpGain=[1,2,3,4,5][LEVELS.indexOf(current.diff)]||1;
  sxp=Math.max(0, sxp + (ok?xpGain:-1));
  const newSlevel=LEVEL_DEFS.filter(l=>l.xp<=sxp).length-1;
  if(newSlevel>slevel){ slevel=newSlevel; showLevelToast(LEVEL_DEFS[slevel].name); }
  updateLevelBar();

  // Mark seen + remove from pool
  seenSet.add(current.id);
  const pi=LEVELS.indexOf(current.diff);
  if(pi>=0){ const idx=pools[pi].findIndex(q=>q.id===current.id); if(idx>=0) pools[pi].splice(idx,1); }

  // Progress
  progress.totalAnswered++; if(ok) progress.totalCorrect++;
  if(!progress.axisStats[current.axis]) progress.axisStats[current.axis]={a:0,c:0};
  progress.axisStats[current.axis].a++; if(ok) progress.axisStats[current.axis].c++;
  saveProgress(); saveSeen();

  // GA4
  try{ gtag('event','quiz_answer',{quiz_type:'reading',question_axis:current.axis,correct:ok,diff:current.diff}); }catch(_){}

  // Show explanation
  $('verdictEl').textContent = ok ? '✅ 正解！' : `❌ 不正解 — 正解: ${current.answer}`;
  $('verdictEl').className   = 'verdict '+(ok?'ok':'ng');
  $('explTextEl').textContent = current.expl;
  $('explEl').classList.remove('hidden');
  $('nextBtn').classList.remove('hidden');
  updateScore();
}

function next(){ loadQ(); }

function toggleJa(){
  const ja=$('jaEl'), btn=$('jaToggle');
  ja.classList.toggle('hidden');
  btn.textContent=ja.classList.contains('hidden')?'日本語訳を見る ▾':'日本語訳を隠す ▴';
}

function updateScore(){
  $('scoreNum').textContent=score;
  $('totalNum').textContent=total;
}

function updateLevelBar(){
  const def=LEVEL_DEFS[slevel];
  const nxt=LEVEL_DEFS[slevel+1];
  $('levelName').textContent=def.name;
  if(nxt){ $('xpBar').style.width=Math.min(100,Math.round((sxp-def.xp)/(nxt.xp-def.xp)*100))+'%'; }
  else    { $('xpBar').style.width='100%'; }
}

function showLevelToast(name){
  const t=document.createElement('div');
  t.className='level-toast';
  t.innerHTML=`<div class="level-toast-inner">⚡ ${name}</div>`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1400);
}

function endSession(){
  const pct=total>0?Math.round(score/total*100):0;
  $('rScore').textContent=score;
  $('rTotal').textContent=total;
  $('rPct').textContent=pct+'%';
  showScreen('complete');
  try{ gtag('event','quiz_session_complete',{quiz_type:'reading',score,total,pct}); }catch(_){}
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } }
</script>
